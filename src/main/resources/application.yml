server:
  port: 8080

spring:
  application:
    name: ride-hailing-simulator

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:ridehailing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    org.example: DEBUG
    org.hibernate.SQL: DEBUG
