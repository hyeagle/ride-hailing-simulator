<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网约车派单调度仿真系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        
        .header { background: linear-gradient(135deg, #1890ff, #096dd9); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.8; }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: white; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
        .tab:hover { background: #e6f7ff; }
        .tab.active { background: #1890ff; color: white; }
        
        .panel { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .panel.active { display: block; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; }
        .stat-card h3 { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; }
        tr:hover { background: #f5f5f5; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-success { background: #52c41a; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-warning { background: #faad14; color: white; }
        .btn:hover { opacity: 0.8; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; max-width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; }
        
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-success { background: #f6ffed; color: #52c41a; }
        .badge-warning { background: #fffbe6; color: #faad14; }
        .badge-danger { background: #fff2f0; color: #ff4d4f; }
        .badge-info { background: #e6f7ff; color: #1890ff; }
        
        .map-container { height: 400px; border-radius: 8px; overflow: hidden; margin-top: 15px; }
        #map { width: 100%; height: 100%; }
        
        .loading { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 网约车派单调度仿真系统</h1>
        <p>南京市仿真场景 - 支持停车场、车辆、站点、订单管理</p>
    </div>
    
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showPanel('overview')">📊 概览</button>
            <button class="tab" onclick="showPanel('parking')">🅿️ 停车场</button>
            <button class="tab" onclick="showPanel('vehicles')">🚗 车辆管理</button>
            <button class="tab" onclick="showPanel('stations')">📍 站点管理</button>
            <button class="tab" onclick="showPanel('orders')">📋 订单管理</button>
            <button class="tab" onclick="showPanel('route')">🗺️ 路线规划</button>
        </div>
        
        <!-- 概览面板 -->
        <div id="overview" class="panel active">
            <div class="stats">
                <div class="stat-card"><h3>停车场总数</h3><div class="number" id="stat-parking">0</div></div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"><h3>车辆总数</h3><div class="number" id="stat-vehicles">0</div></div>
                <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"><h3>站点总数</h3><div class="number" id="stat-stations">0</div></div>
                <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"><h3>订单总数</h3><div class="number" id="stat-orders">0</div></div>
            </div>
            <div class="map-container"><div id="map"></div></div>
        </div>
        
        <!-- 停车场面板 -->
        <div id="parking" class="panel">
            <div style="margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="showModal('parking')">+ 新增停车场</button>
            </div>
            <table id="parking-table">
                <thead><tr><th>ID</th><th>名称</th><th>GIS网格</th><th>容量</th><th>经度</th><th>纬度</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <!-- 车辆面板 -->
        <div id="vehicles" class="panel">
            <div style="margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="showModal('vehicle')">+ 新增车辆</button>
                <select id="vehicle-status-filter" onchange="filterVehicles()">
                    <option value="">全部状态</option>
                    <option value="巡游中">巡游中</option>
                    <option value="履约中">履约中</option>
                    <option value="维护中">维护中</option>
                </select>
            </div>
            <table id="vehicle-table">
                <thead><tr><th>ID</th><th>VIN</th><th>状态</th><th>订单ID</th><th>电量</th><th>经度</th><th>纬度</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <!-- 站点面板 -->
        <div id="stations" class="panel">
            <div style="margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="showModal('station')">+ 新增站点</button>
                <select id="station-type-filter" onchange="filterStations()">
                    <option value="">全部类型</option>
                    <option value="商圈">商圈</option>
                    <option value="景区">景区</option>
                    <option value="医院">医院</option>
                    <option value="社区">社区</option>
                    <option value="交通枢纽">交通枢纽</option>
                </select>
            </div>
            <table id="station-table">
                <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>经度</th><th>纬度</th><th>备注</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <!-- 订单面板 -->
        <div id="orders" class="panel">
            <div style="margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="showModal('order')">+ 新增订单</button>
                <select id="order-status-filter" onchange="filterOrders()">
                    <option value="">全部状态</option>
                    <option value="待派单">待派单</option>
                    <option value="履约中">履约中</option>
                    <option value="已完成">已完成</option>
                    <option value="已取消">已取消</option>
                </select>
            </div>
            <table id="order-table">
                <thead><tr><th>订单ID</th><th>起始站</th><th>终止站</th><th>开始时间</th><th>预计到达</th><th>收益</th><th>状态</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <!-- 路线规划面板 -->
        <div id="route" class="panel">
            <div class="form-group">
                <label>起始地点</label>
                <input type="text" id="route-start" placeholder="例如: 北京站">
            </div>
            <div class="form-group">
                <label>目的地点</label>
                <input type="text" id="route-end" placeholder="例如: 天安门">
            </div>
            <div class="form-group">
                <label>行驶速度 (km/h)</label>
                <input type="number" id="route-speed" value="30" min="1" max="120">
            </div>
            <button class="btn btn-primary" onclick="planRoute()">规划路线</button>
            <button class="btn btn-success" id="driveBtn" onclick="startDriving()" disabled>开始行驶</button>
            <div class="map-container" style="margin-top: 15px;"><div id="route-map"></div></div>
            <div id="route-info" style="margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 4px; display: none;">
                <p>距离: <span id="route-distance"></span></p>
                <p>时间: <span id="route-duration"></span></p>
                <p>当前速度: <span id="current-speed">-</span> km/h</p>
            </div>
        </div>
    </div>
    
    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新增</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script src="https://webapi.amap.com/maps?v=2.0&key=xxx"></script>
    <script>
        let map, routeMap;
        let currentPath = [];
        let carMarker, polyline, isDriving = false, animationId;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initMaps();
            loadStats();
            loadParkingLots();
            loadVehicles();
            loadStations();
            loadOrders();
        });
        
        function initMaps() {
            map = new AMap.Map('map', { zoom: 11, center: [118.795, 32.05], viewMode: '2D' });
            routeMap = new AMap.Map('route-map', { zoom: 11, center: [116.397, 39.909], viewMode: '2D' });
        }
        
        function showPanel(panelId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(panelId).classList.add('active');
        }
        
        async function loadStats() {
            const [parking, vehicles, stations, orders] = await Promise.all([
                fetch('/api/parking-lots').then(r => r.json()),
                fetch('/api/vehicles').then(r => r.json()),
                fetch('/api/stations').then(r => r.json()),
                fetch('/api/orders').then(r => r.json())
            ]);
            document.getElementById('stat-parking').textContent = parking.length;
            document.getElementById('stat-vehicles').textContent = vehicles.length;
            document.getElementById('stat-stations').textContent = stations.length;
            document.getElementById('stat-orders').textContent = orders.length;
        }
        
        async function loadParkingLots() {
            const data = await fetch('/api/parking-lots').then(r => r.json());
            const tbody = document.querySelector('#parking-table tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.id}</td><td>${p.name}</td><td>${p.gisGrid}</td><td>${p.capacity}</td>
                    <td>${p.longitude.toFixed(6)}</td><td>${p.latitude.toFixed(6)}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editParkingLot('${p.id}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteParkingLot('${p.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function loadVehicles() {
            const data = await fetch('/api/vehicles').then(r => r.json());
            renderVehicles(data);
        }
        
        function renderVehicles(data) {
            const tbody = document.querySelector('#vehicle-table tbody');
            tbody.innerHTML = data.map(v => `
                <tr>
                    <td>${v.id}</td><td>${v.vin}</td>
                    <td><span class="badge ${getBadgeClass(v.status)}">${v.status}</span></td>
                    <td>${v.orderId || '-'}</td><td>${v.batteryPercent}%</td>
                    <td>${v.longitude.toFixed(6)}</td><td>${v.latitude.toFixed(6)}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editVehicle('${v.id}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteVehicle('${v.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function filterVehicles() {
            const status = document.getElementById('vehicle-status-filter').value;
            if (!status) { loadVehicles(); return; }
            const data = await fetch(`/api/vehicles/status/${encodeURIComponent(status)}`).then(r => r.json());
            renderVehicles(data);
        }
        
        async function loadStations() {
            const data = await fetch('/api/stations').then(r => r.json());
            renderStations(data.slice(0, 100)); // 只显示前100条
        }
        
        function renderStations(data) {
            const tbody = document.querySelector('#station-table tbody');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.id}</td><td>${s.name}</td>
                    <td><span class="badge badge-info">${s.type}</span></td>
                    <td>${s.longitude.toFixed(6)}</td><td>${s.latitude.toFixed(6)}</td>
                    <td>${s.remark || '-'}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editStation('${s.id}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteStation('${s.id}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function filterStations() {
            const type = document.getElementById('station-type-filter').value;
            if (!type) { loadStations(); return; }
            const data = await fetch(`/api/stations/type/${encodeURIComponent(type)}`).then(r => r.json());
            renderStations(data);
        }
        
        async function loadOrders() {
            const data = await fetch('/api/orders').then(r => r.json());
            renderOrders(data);
        }
        
        function renderOrders(data) {
            const tbody = document.querySelector('#order-table tbody');
            tbody.innerHTML = data.map(o => `
                <tr>
                    <td>${o.id}</td><td>${o.originStationId}</td><td>${o.destinationStationId}</td>
                    <td>${formatTime(o.startTime)}</td><td>${formatTime(o.estimatedArrivalTime)}</td>
                    <td>¥${o.estimatedRevenue.toFixed(2)}</td>
                    <td><span class="badge ${getBadgeClass(o.status)}">${o.status}</span></td>
                    <td>
                        ${o.status === '待派单' ? `<button class="btn btn-primary" onclick="showModal('assign', '${o.id}')">派单</button>` : ''}
                        ${o.status === '履约中' ? `<button class="btn btn-success" onclick="completeOrder('${o.id}')">完成</button>` : ''}
                        ${o.status !== '已完成' && o.status !== '已取消' ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}')">取消</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        async function filterOrders() {
            const status = document.getElementById('order-status-filter').value;
            if (!status) { loadOrders(); return; }
            const data = await fetch(`/api/orders/status/${encodeURIComponent(status)}`).then(r => r.json());
            renderOrders(data);
        }
        
        async function planRoute() {
            const start = document.getElementById('route-start').value.trim();
            const end = document.getElementById('route-end').value.trim();
            if (!start || !end) { alert('请输入起始地点和目的地点'); return; }
            
            const response = await fetch('/api/route/plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: start, destination: end })
            });
            const result = await response.json();
            
            if (result.status === 200) {
                currentPath = result.path;
                document.getElementById('route-info').style.display = 'block';
                document.getElementById('route-distance').textContent = (result.distance / 1000).toFixed(2) + ' 公里';
                document.getElementById('route-duration').textContent = Math.ceil(result.duration / 60) + ' 分钟';
                
                if (polyline) routeMap.remove(polyline);
                if (carMarker) routeMap.remove(carMarker);
                
                polyline = new AMap.Polyline({ path: currentPath, strokeColor: '#1890ff', strokeWeight: 5 });
                routeMap.add(polyline);
                routeMap.setFitView([polyline]);
                
                carMarker = new AMap.Marker({ position: currentPath[0], content: '<div style="font-size: 24px;">🚗</div>', autoRotation: true });
                routeMap.add(carMarker);
                document.getElementById('driveBtn').disabled = false;
            } else {
                alert('路线规划失败: ' + result.message);
            }
        }
        
        function startDriving() {
            if (isDriving) { stopDriving(); return; }
            isDriving = true;
            document.getElementById('driveBtn').textContent = '停止行驶';
            
            let currentIndex = 0, traveledDistance = 0, currentSpeedKmh = parseFloat(document.getElementById('route-speed').value) || 30;
            const intervalMs = 30;
            
            const calculateDistance = (lat1, lng1, lat2, lng2) => {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };
            
            const speedInterval = setInterval(() => {
                if (!isDriving) { clearInterval(speedInterval); return; }
                currentSpeedKmh = (parseFloat(document.getElementById('route-speed').value) || 30) * (0.9 + Math.random() * 0.2);
                document.getElementById('current-speed').textContent = currentSpeedKmh.toFixed(1);
            }, 1000);
            
            animationId = setInterval(() => {
                if (!isDriving) { clearInterval(speedInterval); clearInterval(animationId); return; }
                
                const speedMps = currentSpeedKmh * 1000 / 3600;
                traveledDistance += speedMps * (intervalMs / 1000);
                
                while (currentIndex < currentPath.length - 1) {
                    const [lng1, lat1] = currentPath[currentIndex];
                    const [lng2, lat2] = currentPath[currentIndex + 1];
                    const segDist = calculateDistance(lat1, lng1, lat2, lng2);
                    if (traveledDistance >= segDist) { traveledDistance -= segDist; currentIndex++; }
                    else break;
                }
                
                if (currentIndex >= currentPath.length - 1) {
                    carMarker.setPosition(currentPath[currentPath.length - 1]);
                    stopDriving();
                    alert('已到达目的地！');
                    return;
                }
                
                const [lng1, lat1] = currentPath[currentIndex];
                const [lng2, lat2] = currentPath[currentIndex + 1];
                const segDist = calculateDistance(lat1, lng1, lat2, lng2);
                const progress = segDist > 0 ? traveledDistance / segDist : 1;
                
                carMarker.setPosition([lng1 + (lng2 - lng1) * progress, lat1 + (lat2 - lat1) * progress]);
                carMarker.setAngle(Math.atan2(lat2 - lat1, lng2 - lng1) * 180 / Math.PI);
            }, intervalMs);
        }
        
        function stopDriving() {
            isDriving = false;
            document.getElementById('driveBtn').textContent = '开始行驶';
            document.getElementById('current-speed').textContent = '-';
        }
        
        function showModal(type, id) {
            document.getElementById('modal').classList.add('show');
            // 简化实现，实际应该加载表单
            document.getElementById('modal-title').textContent = type === 'assign' ? '派单' : '新增' + type;
            document.getElementById('modal-body').innerHTML = '<p>功能开发中...</p>';
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function getBadgeClass(status) {
            const map = { '履约中': 'badge-success', '巡游中': 'badge-info', '维护中': 'badge-warning', '待派单': 'badge-info', '已完成': 'badge-success', '已取消': 'badge-danger' };
            return map[status] || 'badge-info';
        }
        
        function formatTime(time) {
            return time ? new Date(time).toLocaleString('zh-CN') : '-';
        }
        
        async function deleteParkingLot(id) { if (confirm('确定删除？')) { await fetch(`/api/parking-lots/${id}`, { method: 'DELETE' }); loadParkingLots(); } }
        async function deleteVehicle(id) { if (confirm('确定删除？')) { await fetch(`/api/vehicles/${id}`, { method: 'DELETE' }); loadVehicles(); } }
        async function deleteStation(id) { if (confirm('确定删除？')) { await fetch(`/api/stations/${id}`, { method: 'DELETE' }); loadStations(); } }
        async function completeOrder(id) { await fetch(`/api/orders/${id}/complete`, { method: 'POST' }); loadOrders(); }
        async function cancelOrder(id) { if (confirm('确定取消？')) { await fetch(`/api/orders/${id}/cancel`, { method: 'POST' }); loadOrders(); } }
    </script>
</body>
</html>
